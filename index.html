<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-SAM | Configurateur LT Showertec 2025</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #293da4; --accent: #5cbbf6; --bg: #f4f7f9; }
        body { background-color: var(--bg); font-family: 'Montserrat', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header-logo { max-width: 180px; height: auto; margin-bottom: 20px; }
        .contact-card { background: linear-gradient(135deg, var(--primary) 0%, #1a2b80 100%); color: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 550px; margin-bottom: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .contact-card h2 { margin: 0; font-size: 1.3rem; }
        .categories { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .cat-btn { padding: 8px 15px; border-radius: 20px; border: 2px solid var(--primary); background: white; cursor: pointer; font-weight: bold; font-size: 0.8rem; color: var(--primary); }
        .cat-btn.active { background: var(--primary); color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; width: 100%; max-width: 1100px; padding-bottom: 250px; }
        .card { background: white; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; border: 3px solid transparent; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card.selected { border-color: var(--accent); background-color: #f0f9ff; }
        .icon-box { font-size: 35px; margin-bottom: 8px; background: #f8f9fa; border-radius: 8px; padding: 10px; }
        h3 { margin: 5px 0; font-size: 0.85rem; color: var(--primary); min-height: 34px; display: flex; align-items: center; justify-content: center; }
        .card p { font-size: 0.75rem; color: #666; margin: 0; }
        .footer-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; z-index: 9999; }
        .client-inputs { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 10px; }
        input { padding: 10px; border: 2px solid #eee; border-radius: 8px; width: 180px; font-family: inherit; }
        #btn-send { background: var(--primary); color: white; padding: 14px 40px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; display: flex; gap: 10px; }
        .details-note { font-size: 0.85rem; margin-top: 10px; font-weight: bold; color: var(--primary); text-align: center; }
    </style>
</head>
<body>
    <img src="C-SAM-.png" alt="Logo C-SAM" class="header-logo">
    <div class="contact-card">
        <h2>CARINE MARTINOT</h2>
        <p>Responsable ZALEOO Bordeaux Ouest</p>
        <p>📞 06.26.59.39.39 | ✉️ bordeaux-ouest@zaleoo.com</p>
    </div>
    <div class="categories">
        <button class="cat-btn active" onclick="filterGrid('Tous', this)">Tous</button>
        <button class="cat-btn" onclick="filterGrid('Receveurs', this)">Receveurs</button>
        <button class="cat-btn" onclick="filterGrid('Habillages', this)">Habillages</button>
        <button class="cat-btn" onclick="filterGrid('Parois', this)">Parois</button>
        <button class="cat-btn" onclick="filterGrid('Equipement', this)">Equipement</button>
    </div>
    <div class="grid" id="product-grid"></div>
    <div class="footer-bar">
        <div class="client-inputs">
            <input type="text" id="c_name" placeholder="Nom et Prénom">
            <input type="tel" id="c_tel" placeholder="Téléphone">
            <input type="text" id="c_addr" placeholder="Adresse de résidence">
        </div>
        <button id="btn-send" onclick="sendDevis()">DEMANDER LE DEVIS <span id="badge">0</span></button>
        <div class="details-note">💡 Plus de détails techniques vous seront communiqués directement par Carine.</div>
    </div>
    <script>
        const catalogue = [
            { cat: 'Receveurs', nom: 'FUTURA NÉO', desc: 'Extra-plat 35mm, PN24.', icon: '🛁' },
            { cat: 'Habillages', nom: 'CARRELO Pierre', desc: 'Texture pierre naturelle.', icon: '🗿' },
            { cat: 'Habillages', nom: 'CARRELO Design', desc: 'Lisse et moderne.', icon: '🎨' },
            { cat: 'Parois', nom: 'Paroi INTIMITY', desc: 'Verre sécurit occultant.', icon: '🖼️' },
            { cat: 'Parois', nom: 'Coulissante 2V', desc: 'Fermeture magnétique.', icon: '🚪' },
            { cat: 'Equipement', nom: 'Siège DESIGN', desc: 'Escamotable et robuste.', icon: '🪑' },
            { cat: 'Equipement', nom: 'Barre de maintien', desc: 'Ergonomique.', icon: '✋' },
            { cat: 'Equipement', nom: 'Colonne Thermostatique', desc: 'Sécurité 38°C.', icon: '🚿' },
            { cat: 'Equipement', nom: 'Miroir LED HD', desc: 'Éclairage sensitif.', icon: '🪞' }
        ];
        let selection = new Set();
        function renderGrid(filter = 'Tous') {
            const container = document.getElementById('product-grid');
            if (!container) return;
            container.innerHTML = "";
            catalogue.forEach(p => {
                if (filter === 'Tous' || p.cat === filter) {
                    const card = document.createElement('div');
                    card.className = "card" + (selection.has(p.nom) ? " selected" : "");
                    card.onclick = function() {
                        if(selection.has(p.nom)) { selection.delete(p.nom); card.classList.remove('selected'); }
                        else { selection.add(p.nom); card.classList.add('selected'); }
                        document.getElementById('badge').innerText = selection.size;
                    };
                    card.innerHTML = `<div class="icon-box">${p.icon}</div><h3>${p.nom}</h3><p>${p.desc}</p>`;
                    container.appendChild(card);
                }
            });
        }
        function filterGrid(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderGrid(cat);
        }
        function sendDevis() {
            const nom = document.getElementById('c_name').value.trim();
            const tel = document.getElementById('c_tel').value.trim();
            const addr = document.getElementById('c_addr').value.trim();
            if (selection.size === 0 || !nom || !tel || !addr) return alert("Remplissez vos coordonnées et choisissez au moins 1 produit.");
            const sujet = "Devis C-SAM : " + nom;
            const corps = `Client: ${nom}\nTel: ${tel}\nAdresse: ${addr}\nProduits: ${Array.from(selection).join(", ")}`;
            window.location.href = `mailto:bordeaux-ouest@zaleoo.com?subject=${encodeURIComponent(sujet)}&body=${encodeURIComponent(corps)}`;
        }
        // Force le chargement au démarrage
        window.onload = function() { renderGrid(); };
    </script>
</body>
</html>
