<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-SAM | Configurateur LT Showertec 2025</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #293da4; --accent: #5cbbf6; --bg: #f4f7f9; }
        body { background-color: var(--bg); font-family: 'Montserrat', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header-logo { max-width: 180px; height: auto; margin-bottom: 20px; }
        
        .contact-card {
            background: linear-gradient(135deg, var(--primary) 0%, #1a2b80 100%);
            color: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 550px;
            margin-bottom: 30px; box-shadow: 0 10px 30px rgba(41, 61, 164, 0.2); text-align: center;
        }
        .contact-card h2 { margin: 0; font-size: 1.3rem; text-transform: uppercase; }
        .contact-card .job { font-size: 0.9rem; color: var(--accent); font-weight: bold; margin: 8px 0; }

        .categories { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .cat-btn { padding: 8px 15px; border-radius: 20px; border: 2px solid var(--primary); background: white; cursor: pointer; font-weight: bold; font-size: 0.8rem; color: var(--primary); }
        .cat-btn.active { background: var(--primary); color: white; }

        .grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; width: 100%; max-width: 1100px; padding-bottom: 280px; 
        }
        .card { 
            background: white; padding: 15px; border-radius: 12px; text-align: center;
            cursor: pointer; border: 3px solid transparent; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .card.selected { border-color: var(--accent); background-color: #f0f9ff; transform: scale(1.02); }
        .icon-box { font-size: 35px; margin-bottom: 8px; background: #f8f9fa; border-radius: 8px; padding: 10px; }
        h3 { margin: 5px 0; font-size: 0.85rem; color: var(--primary); min-height: 34px; display: flex; align-items: center; justify-content: center; }
        .card p { font-size: 0.75rem; color: #666; margin: 0; }

        .footer-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: white; padding: 15px 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; align-items: center; z-index: 9999;
        }
        .help-link { font-size: 0.75rem; color: var(--primary); text-decoration: underline; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
        .client-inputs { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; max-width: 900px; padding: 0 10px; }
        input { padding: 10px; border: 2px solid #eee; border-radius: 8px; width: 180px; font-family: inherit; }
        #c_addr { width: 250px; }
        #btn-send { background: var(--primary); color: white; padding: 14px 40px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; display: flex; gap: 10px; margin-top: 10px; }
        #badge { background: white; color: var(--primary); border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
        
        .details-note { 
            font-size: 0.85rem; 
            margin-top: 12px; 
            font-weight: bold; 
            color: var(--primary); 
            text-align: center;
            padding: 0 15px;
            max-width: 600px;
        }

        @media (max-width: 600px) {
            .client-inputs { flex-direction: column; align-items: center; }
            input, #c_addr { width: 90%; max-width: 300px; }
        }
    </style>
</head>
<body>

    <img src="C-SAM-.png" alt="Logo C-SAM" class="header-logo">

    <div class="contact-card">
        <h2>CARINE MARTINOT</h2>
        <div class="job">Responsable ZALEOO Bordeaux Ouest</div>
        <p>📞 06.26.59.39.39 | ✉️ bordeaux-ouest@zaleoo.com</p>
    </div>

    <div class="categories">
        <button class="cat-btn active" onclick="filterGrid('Tous', this)">Tous</button>
        <button class="cat-btn" onclick="filterGrid('Receveurs', this)">Receveurs</button>
        <button class="cat-btn" onclick="filterGrid('Habillages', this)">Habillages</button
