<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-SAM | Configurateur Showertec 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue:#293da4;--blue-dk:#1a2878;--sky:#5cbbf6;--bg:#f0f3f8;
            --white:#ffffff;--text:#1c1f2e;--muted:#7a80a0;--border:#e2e7f2;
            --sel-bg:#eef4ff;--sel-bd:#5cbbf6;
            --shadow:0 4px 20px rgba(41,61,164,0.08);
            --shadow-h:0 8px 32px rgba(41,61,164,0.16);
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;}

        /* HEADER */
        .header{background:linear-gradient(135deg,var(--blue-dk) 0%,var(--blue) 60%,#3a52c4 100%);padding:28px 24px 32px;display:flex;flex-direction:column;align-items:center;gap:20px;position:relative;overflow:hidden;}
        .header::before{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(92,187,246,0.18) 0%,transparent 70%);top:-100px;right:-80px;border-radius:50%;}
        .header::after{content:'';position:absolute;width:250px;height:250px;background:radial-gradient(circle,rgba(255,255,255,0.06) 0%,transparent 70%);bottom:-60px;left:20px;border-radius:50%;}
        .header-logo{max-width:160px;height:auto;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.2));position:relative;z-index:1;}
        .contact-card{background:rgba(255,255,255,0.10);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.18);color:white;padding:20px 28px;border-radius:20px;width:100%;max-width:480px;text-align:center;position:relative;z-index:1;}
        .contact-avatar{width:72px;height:72px;border-radius:50%;display:block;margin:0 auto 12px;box-shadow:0 4px 16px rgba(0,0,0,0.3);object-fit:cover;object-position:top;border:3px solid rgba(255,255,255,0.3);}
        .contact-card h2{font-family:'DM Serif Display',serif;font-size:1.25rem;font-weight:400;letter-spacing:0.02em;margin-bottom:4px;}
        .contact-job{font-size:0.78rem;color:var(--sky);font-weight:500;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;}
        .contact-info{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
        .contact-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:50px;padding:5px 12px;font-size:0.78rem;font-weight:500;}

        /* MAIN */
        .main{max-width:1100px;margin:0 auto;padding:28px 20px 380px;}
        .section-title{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--blue);margin-bottom:6px;}
        .section-sub{font-size:0.82rem;color:var(--muted);margin-bottom:20px;}

        /* FILTRES */
        .categories{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;}
        .cat-btn{padding:8px 18px;border-radius:50px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;font-size:0.82rem;color:var(--muted);transition:all 0.2s ease;box-shadow:0 2px 6px rgba(0,0,0,0.04);}
        .cat-btn:hover{border-color:var(--blue);color:var(--blue);}
        .cat-btn.active{background:var(--blue);border-color:var(--blue);color:white;box-shadow:0 4px 12px rgba(41,61,164,0.25);}

        /* GRILLE */
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;}
        .card{background:var(--white);padding:20px 16px;border-radius:16px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all 0.22s ease;box-shadow:var(--shadow);position:relative;overflow:hidden;}
        .card:hover{box-shadow:var(--shadow-h);transform:translateY(-2px);}
        .card.selected{border-color:var(--sel-bd);background:var(--sel-bg);box-shadow:0 6px 24px rgba(92,187,246,0.25);transform:translateY(-2px);}
        .card.selected::after{content:'✓';position:absolute;top:10px;right:12px;width:22px;height:22px;background:var(--sky);color:white;border-radius:50%;font-size:0.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:22px;}
        .icon-box{font-size:36px;margin-bottom:12px;background:var(--bg);border-radius:12px;padding:12px;display:inline-block;transition:transform 0.2s;}
        .card:hover .icon-box{transform:scale(1.08);}
        .card-cat{font-size:0.65rem;color:var(--sky);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;}
        .card h3{font-size:0.88rem;font-weight:600;color:var(--blue);margin-bottom:6px;min-height:36px;display:flex;align-items:center;justify-content:center;line-height:1.3;}
        .card p{font-size:0.74rem;color:var(--muted);line-height:1.4;}

        /* FOOTER */
        .footer-bar{position:fixed;bottom:0;left:0;width:100%;background:var(--white);padding:12px 20px 14px;box-shadow:0 -4px 30px rgba(41,61,164,0.10);display:flex;flex-direction:column;align-items:center;gap:8px;z-index:9999;border-top:1px solid var(--border);}
        .help-btn{font-size:0.75rem;color:var(--blue);cursor:pointer;font-weight:600;background:var(--sel-bg);border:1.5px solid var(--border);border-radius:50px;padding:6px 14px;transition:all 0.2s;}
        .help-btn:hover{background:var(--blue);color:white;border-color:var(--blue);}
        .client-inputs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
        .input-wrap{position:relative;display:flex;align-items:center;}
        .input-icon{position:absolute;left:11px;font-size:0.82rem;pointer-events:none;}
        input{padding:9px 12px 9px 32px;border:1.5px solid var(--border);border-radius:10px;width:172px;font-family:'DM Sans',sans-serif;font-size:0.82rem;color:var(--text);background:var(--bg);transition:border-color 0.2s,box-shadow 0.2s;outline:none;}
        input:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(92,187,246,0.15);background:white;}
        input::placeholder{color:var(--muted);}
        #btn-send{background:linear-gradient(135deg,var(--blue) 0%,#3a52c4 100%);color:white;padding:12px 36px;border-radius:50px;font-weight:600;font-size:0.88rem;border:none;cursor:pointer;display:flex;align-items:center;gap:10px;letter-spacing:0.04em;box-shadow:0 4px 16px rgba(41,61,164,0.3);transition:all 0.2s;font-family:'DM Sans',sans-serif;}
        #btn-send:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(41,61,164,0.4);}
        #badge{background:var(--sky);color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;}
        .footer-note{font-size:0.70rem;color:var(--muted);text-align:center;}

        /* MODALE */
        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,15,40,0.5);backdrop-filter:blur(4px);z-index:99999;align-items:center;justify-content:center;}
        .modal-overlay.open{display:flex;}
        .modal-box{background:white;border-radius:24px;padding:32px 28px;max-width:430px;width:92%;box-shadow:0 24px 80px rgba(0,0,0,0.18);animation:popIn 0.28s cubic-bezier(0.34,1.56,0.64,1);}
        @keyframes popIn{from{transform:scale(0.82) translateY(12px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
        .modal-header{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
        .modal-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--blue),#3a52c4);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
        .modal-title{font-family:'DM Serif Display',serif;font-size:1.15rem;color:var(--blue);}
        .modal-step{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px;}
        .step-num{background:linear-gradient(135deg,var(--blue),#3a52c4);color:white;border-radius:10px;width:30px;height:30px;min-width:30px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.82rem;}
        .step-text{font-size:0.84rem;color:#444;line-height:1.6;padding-top:4px;}
        .modal-note{font-size:0.74rem;color:var(--muted);background:var(--bg);border-radius:12px;padding:12px 14px;margin-top:18px;line-height:1.5;border-left:3px solid var(--sky);}
        .modal-close{display:block;width:100%;margin-top:20px;background:linear-gradient(135deg,var(--blue),#3a52c4);color:white;border:none;border-radius:50px;padding:12px;font-weight:600;font-size:0.9rem;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:0.03em;transition:all 0.2s;}
        .modal-close:hover{opacity:0.9;transform:translateY(-1px);}

        @media(max-width:600px){.main{padding:20px 14px 420px;}.grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}input{width:145px;}}
    </style>
</head>
